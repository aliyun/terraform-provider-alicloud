# Terraform Provider v2 prerelease workflow.
name: Release

on:
  push:
    tags:
      - 'v2.*'

jobs:
  goreleaser:
    runs-on: terraform-releaser
    environment: v2-release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate prerelease tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v2\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-(beta|rc)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid v2 prerelease tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
      - name: Validate release branch ancestry
        shell: bash
        env:
          V2_RELEASE_BRANCH: ${{ vars.V2_RELEASE_BRANCH || 'release/v2' }}
        run: |
          if [[ ! "$V2_RELEASE_BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]] || ! git check-ref-format --branch "$V2_RELEASE_BRANCH" >/dev/null; then
            echo "Invalid V2 release branch name" >&2
            exit 1
          fi
          git fetch --no-tags origin \
            "+refs/heads/${V2_RELEASE_BRANCH}:refs/remotes/origin/${V2_RELEASE_BRANCH}"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "refs/remotes/origin/${V2_RELEASE_BRANCH}"; then
            echo "Tag commit $GITHUB_SHA is not part of $V2_RELEASE_BRANCH" >&2
            exit 1
          fi
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: v2.17.0
          args: release --clean --timeout 500m --parallelism 1
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
