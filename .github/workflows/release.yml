# Terraform Provider v2 prerelease workflow.
name: Release

on:
  push:
    tags:
      - 'v2.*'

jobs:
  goreleaser:
    runs-on: terraform-releaser
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate prerelease tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v2\.[0-9]+\.[0-9]+-(beta|rc)\.[0-9]+$ ]]; then
            echo "Invalid v2 prerelease tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          args: release --clean --timeout 500m --parallelism 1
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
